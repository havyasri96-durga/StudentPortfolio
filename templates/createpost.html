<!DOCTYPE html>
<html>
<head>

    <title>Create Blog Post</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="page-wrapper">

    <div class="dashboard-container">

        <div class="blog-form-card">

            <h1 class="title">
                ✍️ Create Blog Post
            </h1>

            <form action="/savepost" method="POST">

                <div class="form-group">

                    <label>
                        📝 Post Title
                    </label>

                    <input
                    type="text"
                    name="title"
                    placeholder="Enter blog title"
                    required>

                </div>

                <div class="form-group">

                    <label>
                        👤 Author
                    </label>

                    <input
                    type="text"
                    name="author"
                    placeholder="Enter author name"
                    required>

                </div>

                <div class="form-group">

                    <label>
                        🏷 Category
                    </label>

                    <input
                    type="text"
                    name="category"
                    placeholder="Programming, Technology, News..."
                    required>

                </div>

                <div class="form-group">

                    <label>
                        📄 Blog Content
                    </label>

                    <textarea
                    name="content"
                    rows="12"
                    placeholder="Write your blog here..."
                    required></textarea>

                </div>

                <div class="form-buttons">

                    <button
                    type="submit"
                    class="publish-btn">

                        🚀 Publish Post

                    </button>

                    <a href="/campusblog"
                       class="cancel-btn">

                        🏠 Back

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
