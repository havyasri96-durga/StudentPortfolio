<!DOCTYPE html>
<html>
<head>
    <title>Browse Products</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="page-wrapper">

    <div class="card">

        <h1 class="title">🛍 Browse Products</h1>

        <!-- SEARCH BAR -->
        <form method="POST" action="/browseproducts" class="search-bar">
            <input type="text" name="search" placeholder="Search products...">
            <button type="submit">Search</button>
        </form>

        <!-- PRODUCT GRID -->
        <div class="product-grid">

            {% for product in products %}
            <div class="product-card">

                <h3>{{ product[0] }}</h3>

                <p class="price">₹{{ product[1] }}</p>

                <form action="/addtocart" method="GET" class="cart-form">

                    <input type="hidden" name="product_name" value="{{ product[0] }}">

                    <input type="number" name="quantity" min="1" value="1">

                    <button type="submit">Add to Cart</button>

                </form>

            </div>
            {% endfor %}

        </div>

    </div>

</div>

</body>
</html>
