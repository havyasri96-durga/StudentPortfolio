<!DOCTYPE html>
<html>
<head>

    <title>Student Management System</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg,#2c3e50,#3498db);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:380px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0px 8px 20px rgba(0,0,0,0.3);
            text-align:center;
        }

        .login-box h1{
            color:#2c3e50;
            margin-bottom:10px;
        }

        .login-box p{
            color:gray;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:6px;
            box-sizing:border-box;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#3498db;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#2980b9;
        }

        .footer{
            margin-top:20px;
            color:gray;
            font-size:13px;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h1>🎓 Student Management System</h1>

    <p><b>Admin Login Portal</b></p>

    <form action="/login" method="POST">

        <input type="text"
               name="userid"
               placeholder="Enter Username"
               required>

        <input type="password"
               name="passwordid"
               placeholder="Enter Password"
               required>

        <button type="submit">Login</button>

    </form>

    <div class="footer">
        Godavari Global University
    </div>

</div>

</body>
</html>
