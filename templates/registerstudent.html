<!DOCTYPE html>
<html>
<head>
    <title>Register Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="page-wrapper">

    <div class="card">

        <h1 class="title">Register Student</h1>

        <form action="/savestudent" method="POST" class="form">

            <div class="form-group">
                <label>Name</label>
                <input type="text" name="student_name" placeholder="Student Name" required>
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="student_age" placeholder="Age" required>
            </div>

            <div class="form-group">
                <label>College</label>
                <input type="text" name="student_college" placeholder="College" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="student_phone" placeholder="Phone" required>
            </div>

            <div class="form-group">
                <label>Branch</label>
                <input type="text" name="student_branch" placeholder="Branch" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn">Register</button>

        </form>

    </div>

</div>

</body>
</html>
