<!DOCTYPE html>
<html>
<head>
    <title>Delete Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="page-wrapper">

    <div class="card">

        <h1 class="title">Delete Student</h1>

        <p class="warning-text">⚠ Enter Student ID carefully. This action cannot be undone.</p>

        <form action="/deleterecord" method="POST" class="form">

            <div class="form-group">
                <input type="number" name="student_id" placeholder="Student ID" required>
            </div>

            <button type="submit" class="btn danger-btn">Delete Student</button>

        </form>

    </div>

</div>

</body>
</html>
