<!DOCTYPE html>
<html>
<head>
    <title>View Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="page-wrapper">

    <div class="card table-card">

        <h1 class="title">🛒 Your Cart</h1>

        <div class="table-container">

            <table class="styled-table">

                <thead>
                    <tr>
                        <th>id</th>
                        <th>name</th>
                        <th>product</th>
                        <th>price</th>
                        <th>quantity</th>
                        <th>subtotal</th>
                    </tr>
                </thead>

                <tbody>
                    {% for item in cart %}
                    <tr>
                        <td>{{ item[0] }}</td>
                        <td>{{ item[1] }}</td>
                        <td>{{ item[2] }}</td>
                        <td>₹{{ item[3] }}</td> 
                        <td>{{ item[4] }}</td>  
                        <td>₹{{ item[5] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>

        <div class="cart-total">
            <h2>Total: ₹ {{ total }}</h2>
        </div>

    </div>

</div>

</body>
</html>
