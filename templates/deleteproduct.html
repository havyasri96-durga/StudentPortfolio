<!DOCTYPE html>
<html>
<head>
    <title>Delete Product</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="page-wrapper">

    <div class="card">

        <h1 class="title">Delete Product</h1>

        <p class="warning-text">⚠ Enter Product ID carefully. This action cannot be undone.</p>

        <form action="/deleteproductrecord" method="POST" class="form">

            <div class="form-group">
                <label>Product Id</label>
                <input type="number" name="product_id" placeholder="Product ID" required>
            </div>

            <button type="submit" class="btn danger-btn">Delete Product</button>

        </form>

    </div>

</div>

</body>
</html>
