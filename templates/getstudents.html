<!DOCTYPE html>
<html>
<head>
    <title>All Students</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Student Details</h2>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Age</th>
    <th>College</th>
    <th>Phone</th>
    <th>Branch</th>
</tr>

{% for student in students %}

<tr>
    <td>{{ student[0] }}</td>
    <td>{{ student[1] }}</td>
    <td>{{ student[2] }}</td>
    <td>{{ student[3] }}</td>
    <td>{{ student[4] }}</td>
    <td>{{ student[5] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
